appId: ai.openclaw.installer
productName: OpenClaw Installer
copyright: Copyright © OpenClaw

directories:
  output: ../dist-gui/packages
  buildResources: build

files:
  - dist-gui/main/**/*
  - dist-gui/renderer/**/*
  # Include the compiled installer logic (required by main process at runtime)
  - dist/src/**/*.js
  - package.json

# Ensure node_modules for runtime dependencies (react, zod) are bundled via
# electron-builder's dependency tree walk. If they become tree-shakeable via
# Vite/rollup, this can be removed.
extraResources: []

asar: true

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: false
  perMachine: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: OpenClaw Installer
  include: build/installer.nsh
  deleteAppDataOnUninstall: false

publish: null
