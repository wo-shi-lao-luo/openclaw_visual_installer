appId: ai.openclaw.installer
productName: OpenClaw Installer
copyright: Copyright © OpenClaw

directories:
  output: ../dist-gui/packages
  buildResources: gui/build

files:
  - dist-gui/main/**/*
  # dist-gui/renderer is placed in extraResources (outside asar) for reliable file:// loading
  - dist/src/**/*.js
  - package.json

# Renderer is served as plain files outside the asar so loadFile works without
# any asar-interception subtleties.
extraResources:
  - from: dist-gui/renderer
    to: renderer

asar: true

win:
  target:
    - target: portable
      arch:
        - x64
  icon: build/icon.ico
  sign: false
  signAndEditExecutable: false
  signingHashAlgorithms: []

publish: null
